<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ConnectHub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <h1>ConnectHub</h1>
    <p class="subtitle">A lightweight contact manager with search and quick actions.</p>
  </header>

  <main class="app">
    <section class="panel">
      <h2>Add a Contact</h2>
      <div class="form">
        <input id="name" placeholder="Name" autocomplete="name">
        <input id="email" placeholder="Email" autocomplete="email" type="email">
        <input id="phone" placeholder="Phone" autocomplete="tel" type="tel">
        <input id="tag" placeholder="Tag (Friend / Client)">
        <button class="primary" onclick="addContact()">Add Contact</button>
      </div>
    </section>

    <section class="panel">
      <h2>Search Contacts</h2>
      <div class="search">
        <input id="search" placeholder="Search by name, email, or phone">
        <button class="secondary" onclick="searchContact()">Search</button>
        <button class="secondary" onclick="loadContacts()">Clear</button>
      </div>
    </section>

    <section class="panel">
      <h2>Contacts</h2>
      <ul id="contactList" class="contact-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
